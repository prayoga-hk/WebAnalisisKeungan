<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DompetKu – Catat Keuanganmu</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --accent3: #6bffb8;
    --text: #f0f0ff;
    --muted: #7070a0;
    --income: #6bffb8;
    --expense: #ff6b9d;
    --income-bg: rgba(107,255,184,0.08);
    --expense-bg: rgba(255,107,157,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,107,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(107,255,184,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; }

  /* LOADING OVERLAY */
  #loadingOverlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 1rem;
    backdrop-filter: blur(6px);
  }
  #loadingOverlay.hidden { display: none !important; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 0.9rem; }

  /* LOGIN */
  #loginPage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%; max-width: 420px;
    box-shadow: 0 0 80px rgba(124,107,255,0.12);
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .login-logo {
    font-size: 2.2rem; font-weight: 800; margin-bottom: 0.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; line-height: 1.5; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .tab-btn {
    flex: 1; padding: 0.6rem; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 0.85rem; font-weight: 600;
    background: var(--surface); color: var(--muted); transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .form-group input {
    width: 100%; padding: 0.8rem 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-main {
    width: 100%; padding: 0.9rem;
    background: linear-gradient(135deg, var(--accent), #9b87ff);
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(124,107,255,0.4);
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,107,255,0.5); }
  .btn-main:active { transform: translateY(0); }
  .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-msg { margin-top: 1rem; text-align: center; font-size: 0.85rem; min-height: 1.2rem; padding: 0.5rem; border-radius: 8px; }
  .auth-msg.err { color: var(--expense); background: var(--expense-bg); }
  .auth-msg.ok { color: var(--income); background: var(--income-bg); }

  /* APP */
  #appPage { display: none; min-height: 100vh; padding: 1rem; max-width: 960px; margin: 0 auto; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.4rem; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; margin-bottom: 1.2rem;
  }
  .top-logo { font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .top-right { display: flex; align-items: center; gap: 0.8rem; }
  .user-badge {
    background: var(--surface); border: 1px solid var(--border);
    padding: 0.4rem 0.9rem; border-radius: 20px;
    font-size: 0.82rem; color: var(--muted); font-weight: 600;
  }
  .btn-logout {
    padding: 0.4rem 0.9rem; background: transparent;
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--expense); font-family: 'Sora', sans-serif; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: var(--expense-bg); border-color: var(--expense); }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin-bottom: 1.2rem; }
  @media(max-width:600px) { .summary-grid { grid-template-columns: 1fr; } }
  .sum-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.2rem 1.5rem;
    transition: transform 0.2s;
  }
  .sum-card:hover { transform: translateY(-2px); }
  .sum-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .sum-val { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 600; }
  .sum-val.inc { color: var(--income); }
  .sum-val.exp { color: var(--expense); }
  .sum-val.bal { color: var(--accent); }
  .sum-val.bal.neg { color: var(--expense); }

  /* MAIN GRID */
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  @media(max-width:700px) { .main-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.5rem;
  }
  .panel-title {
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.2rem;
  }

  /* FORM */
  .type-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .type-btn {
    flex: 1; padding: 0.7rem; border: 1px solid transparent;
    border-radius: 10px; font-family: 'Sora', sans-serif;
    font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .type-btn.income-btn { background: var(--income-bg); color: var(--income); border-color: rgba(107,255,184,0.15); }
  .type-btn.income-btn.active { background: var(--income); color: #0a0a0f; border-color: var(--income); }
  .type-btn.expense-btn { background: var(--expense-bg); color: var(--expense); border-color: rgba(255,107,157,0.15); }
  .type-btn.expense-btn.active { background: var(--expense); color: #fff; border-color: var(--expense); }

  .cat-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
  .chip {
    padding: 0.3rem 0.75rem; border-radius: 20px;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    background: var(--surface); color: var(--muted);
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .chip:hover { border-color: var(--muted); color: var(--text); }
  .chip.sel-inc { background: var(--income-bg); color: var(--income); border-color: var(--income); }
  .chip.sel-exp { background: var(--expense-bg); color: var(--expense); border-color: var(--expense); }

  .input-row { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 0.8rem; }
  .inp {
    padding: 0.75rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  .inp:focus { border-color: var(--accent); }
  .btn-add {
    width: 100%; padding: 0.85rem; border: none; border-radius: 10px;
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .btn-add:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-add.inc-mode { background: linear-gradient(135deg,#6bffb8,#00d4a0); color: #0a0a0f; box-shadow: 0 4px 16px rgba(107,255,184,0.25); }
  .btn-add.exp-mode { background: linear-gradient(135deg,#ff6b9d,#ff3a6e); color: #fff; box-shadow: 0 4px 16px rgba(255,107,157,0.25); }
  .btn-add:not(:disabled):hover { transform: translateY(-1px); }

  /* PIE */
  .chart-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  #pieCanvas { max-width: 200px; max-height: 200px; }
  .legend { display: flex; flex-direction: column; gap: 0.45rem; width: 100%; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; }
  .leg-left { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); flex: 1; min-width: 0; }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .leg-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .leg-pct { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 0.78rem; margin-left: 0.5rem; flex-shrink: 0; }

  /* TRANSACTIONS */
  .tx-panel { grid-column: span 2; }
  @media(max-width:700px) { .tx-panel { grid-column: span 1; } }
  .tx-filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.35rem 0.8rem; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-family: 'Sora', sans-serif; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .tx-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 340px; overflow-y: auto; }
  .tx-list::-webkit-scrollbar { width: 4px; }
  .tx-list::-webkit-scrollbar-track { background: transparent; }
  .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .tx-item {
    display: flex; align-items: center; gap: 0.9rem;
    padding: 0.85rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .tx-icon-wrap {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .tx-icon-wrap.inc-bg { background: var(--income-bg); }
  .tx-icon-wrap.exp-bg { background: var(--expense-bg); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-cat { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-note { color: var(--muted); font-size: 0.76rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; }
  .tx-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
  .tx-amount.inc { color: var(--income); }
  .tx-amount.exp { color: var(--expense); }
  .tx-date { color: var(--muted); font-size: 0.72rem; white-space: nowrap; }
  .tx-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.85rem; padding: 0.25rem 0.4rem; border-radius: 6px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .tx-del:hover { color: var(--expense); background: var(--expense-bg); }
  .empty-state {
    text-align: center; color: var(--muted); padding: 2.5rem;
    font-size: 0.9rem; line-height: 1.8;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Memuat DompetKu...</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page hidden">
  <div class="login-box">
    <div class="login-logo">💰 DompetKu</div>
    <div class="login-sub">Catat keuanganmu, login dari perangkat mana pun & data selalu tersinkron ☁️</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input id="loginUser" type="text" placeholder="username kamu" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">Masuk →</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input id="regUser" type="text" placeholder="pilih username (min. 3 karakter)">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="regPass" type="password" placeholder="minimal 6 karakter">
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input id="regPass2" type="password" placeholder="ulangi password"
          onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn-main" id="registerBtn" onclick="doRegister()">Daftar Sekarang →</button>
    </div>

    <div id="authMsg" class="auth-msg hidden"></div>
  </div>
</div>

<!-- APP PAGE -->
<div id="appPage" class="page hidden">
  <div class="top-bar">
    <div class="top-logo">💰 DompetKu</div>
    <div class="top-right">
      <div class="user-badge" id="userBadge">👤 —</div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-label">💚 Total Pemasukan</div>
      <div class="sum-val inc" id="totalIncome">Rp 0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">🔴 Total Pengeluaran</div>
      <div class="sum-val exp" id="totalExpense">Rp 0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">💜 Saldo</div>
      <div class="sum-val bal" id="totalBalance">Rp 0</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- INPUT FORM -->
    <div class="panel">
      <div class="panel-title">✏️ Tambah Transaksi</div>
      <div class="type-toggle">
        <button class="type-btn income-btn active" id="incBtn" onclick="setType('income')">+ Pemasukan</button>
        <button class="type-btn expense-btn" id="expBtn" onclick="setType('expense')">− Pengeluaran</button>
      </div>
      <div id="catChips" class="cat-chips"></div>
      <div class="input-row">
        <input class="inp" id="amtInp" type="number" placeholder="Jumlah (Rp)" min="1" step="1000">
        <input class="inp" id="noteInp" type="text" placeholder="Catatan (opsional)" maxlength="80">
      </div>
      <button class="btn-add inc-mode" id="addBtn" onclick="addTransaction()">+ Tambah Pemasukan</button>
    </div>

    <!-- PIE CHART -->
    <div class="panel">
      <div class="panel-title">📊 Grafik per Kategori</div>
      <div class="chart-wrap">
        <canvas id="pieCanvas" width="200" height="200"></canvas>
        <div class="legend" id="pieLegend"></div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="panel tx-panel">
      <div class="panel-title">🗂️ Riwayat Transaksi</div>
      <div class="tx-filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">Semua</button>
        <button class="filter-btn" onclick="setFilter('income',this)">Pemasukan</button>
        <button class="filter-btn" onclick="setFilter('expense',this)">Pengeluaran</button>
      </div>
      <div class="tx-list" id="txList">
        <div class="empty-state"><div class="empty-icon">🗒️</div>Memuat transaksi...</div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// SUPABASE INIT
// ══════════════════════════════════════════════════════════
const SUPA_URL = 'https://azagkgqtsfazptxmjufw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6YWdrZ3F0c2ZhenB0eG1qdWZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTQyNzMsImV4cCI6MjA5MDEzMDI3M30.v6HeS5addLL4AiSzyPG87y85v_Mz8BS_-INc6K1ZA_Q';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════════════════════
// CATEGORIES
// ══════════════════════════════════════════════════════════
const CATS = {
  income: [
    {name:'💼 Gaji',icon:'💼'},
    {name:'📦 Freelance',icon:'📦'},
    {name:'🏦 Tabungan Masuk',icon:'🏦'},
    {name:'🎁 Hadiah',icon:'🎁'},
    {name:'💹 Investasi',icon:'💹'},
    {name:'🛍️ Penjualan',icon:'🛍️'},
    {name:'💰 Lainnya',icon:'💰'},
  ],
  expense: [
    {name:'🍜 Makan/Jajan',icon:'🍜'},
    {name:'🚌 Transport',icon:'🚌'},
    {name:'🏠 Kos/Sewa',icon:'🏠'},
    {name:'🎮 Hiburan',icon:'🎮'},
    {name:'🛒 Belanja',icon:'🛒'},
    {name:'💊 Kesehatan',icon:'💊'},
    {name:'📱 Pulsa/Data',icon:'📱'},
    {name:'🏫 Pendidikan',icon:'🏫'},
    {name:'🏦 Nabung',icon:'🏦'},
    {name:'💡 Listrik/Air',icon:'💡'},
    {name:'💸 Lainnya',icon:'💸'},
  ]
};

const PIE_COLORS = [
  '#7c6bff','#6bffb8','#ff6b9d','#ffb86b','#6bdaff',
  '#ff6bff','#b8ff6b','#6b9dff','#ff9d6b','#6bffda','#c26bff'
];

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let currentUser = null;
let currentUsername = '';
let transactions = [];
let currentType = 'income';
let selectedCat = '';
let txFilter = 'all';

// ══════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════
function showLoad(msg = 'Memuat...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoad() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}
function showPage(name) {
  document.getElementById('loginPage').classList.toggle('hidden', name !== 'login');
  document.getElementById('appPage').classList.toggle('hidden', name !== 'app');
  if(name === 'login') document.getElementById('loginPage').style.display = 'flex';
  else document.getElementById('loginPage').style.display = 'none';
  if(name === 'app') document.getElementById('appPage').style.display = 'block';
}
function showAuthMsg(msg, type = 'err') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
  el.classList.remove('hidden');
}
function clearAuthMsg() {
  const el = document.getElementById('authMsg');
  el.className = 'auth-msg hidden';
  el.textContent = '';
}
function fmtRp(n) {
  return 'Rp ' + Math.abs(n).toLocaleString('id-ID');
}
function fmtShort(n) {
  if(n >= 1e9) return (n/1e9).toFixed(1)+'M';
  if(n >= 1e6) return (n/1e6).toFixed(1)+' jt';
  if(n >= 1e3) return (n/1e3).toFixed(0)+' rb';
  return n.toString();
}

// ══════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════
function switchTab(t) {
  document.getElementById('loginForm').classList.toggle('hidden', t !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', t !== 'register');
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', t==='login' ? i===0 : i===1));
  clearAuthMsg();
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim().toLowerCase();
  const password = document.getElementById('loginPass').value;
  if(!username || !password) return showAuthMsg('Isi semua kolom!');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Masuk...';
  clearAuthMsg();

  try {
    // Cari email dari profiles berdasarkan username
    const { data: prof, error: profErr } = await sb
      .from('profiles')
      .select('id')
      .eq('username', username)
      .single();

    if(profErr || !prof) {
      showAuthMsg('Username tidak ditemukan!');
      btn.disabled = false; btn.textContent = 'Masuk →'; return;
    }

    // Login dengan email virtual (username@dompetku.app)
    const email = username + '@dompetku.app';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) { showAuthMsg('Password salah!'); btn.disabled=false; btn.textContent='Masuk →'; return; }

    currentUser = data.user;
    currentUsername = username;
    await enterApp();
  } catch(e) {
    showAuthMsg('Terjadi kesalahan: ' + e.message);
    btn.disabled = false; btn.textContent = 'Masuk →';
  }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim().toLowerCase();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;

  if(!username || !password || !password2) return showAuthMsg('Isi semua kolom!');
  if(username.length < 3) return showAuthMsg('Username minimal 3 karakter!');
  if(!/^[a-z0-9_]+$/.test(username)) return showAuthMsg('Username hanya huruf kecil, angka, dan _');
  if(password.length < 6) return showAuthMsg('Password minimal 6 karakter!');
  if(password !== password2) return showAuthMsg('Konfirmasi password tidak cocok!');

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Mendaftar...';
  clearAuthMsg();

  try {
    // Cek apakah username sudah ada
    const { data: existing } = await sb
      .from('profiles')
      .select('id')
      .eq('username', username)
      .maybeSingle();

    if(existing) {
      showAuthMsg('Username sudah dipakai, pilih yang lain!');
      btn.disabled = false; btn.textContent = 'Daftar Sekarang →'; return;
    }

    const email = username + '@dompetku.app';
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });

    if(error) {
      showAuthMsg('Gagal daftar: ' + error.message);
      btn.disabled = false; btn.textContent = 'Daftar Sekarang →'; return;
    }

    showAuthMsg('✅ Berhasil daftar! Silakan masuk.', 'ok');
    setTimeout(() => {
      switchTab('login');
      document.getElementById('loginUser').value = username;
      btn.disabled = false; btn.textContent = 'Daftar Sekarang →';
    }, 1500);
  } catch(e) {
    showAuthMsg('Terjadi kesalahan: ' + e.message);
    btn.disabled = false; btn.textContent = 'Daftar Sekarang →';
  }
}

async function doLogout() {
  showLoad('Keluar...');
  await sb.auth.signOut();
  currentUser = null; currentUsername = ''; transactions = [];
  hideLoad();
  showPage('login');
}

// ══════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════
async function enterApp() {
  showLoad('Memuat data...');
  document.getElementById('userBadge').textContent = '👤 ' + currentUsername;
  showPage('app');
  renderCats();
  await fetchTransactions();
  hideLoad();
}

async function fetchTransactions() {
  if(!currentUser) return;
  const { data, error } = await sb
    .from('transactions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(100);
  if(!error) transactions = data || [];
  renderAll();
}

// ══════════════════════════════════════════════════════════
// FORM
// ══════════════════════════════════════════════════════════
function setType(t) {
  currentType = t; selectedCat = '';
  document.getElementById('incBtn').classList.toggle('active', t==='income');
  document.getElementById('expBtn').classList.toggle('active', t==='expense');
  const btn = document.getElementById('addBtn');
  btn.className = 'btn-add ' + (t==='income' ? 'inc-mode' : 'exp-mode');
  btn.textContent = t==='income' ? '+ Tambah Pemasukan' : '− Tambah Pengeluaran';
  renderCats();
}

function renderCats() {
  const cont = document.getElementById('catChips');
  cont.innerHTML = '';
  CATS[currentType].forEach(c => {
    const el = document.createElement('div');
    const isSel = selectedCat === c.name;
    el.className = 'chip' + (isSel ? (currentType==='income' ? ' sel-inc' : ' sel-exp') : '');
    el.textContent = c.name;
    el.onclick = () => { selectedCat = c.name; renderCats(); };
    cont.appendChild(el);
  });
}

async function addTransaction() {
  const amt = parseFloat(document.getElementById('amtInp').value);
  const note = document.getElementById('noteInp').value.trim();
  if(!selectedCat) { alert('Pilih kategori dulu!'); return; }
  if(!amt || amt <= 0) { alert('Masukkan jumlah yang valid!'); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = 'Menyimpan...';

  const cat = CATS[currentType].find(c => c.name === selectedCat);
  const now = new Date();
  const dateStr = now.toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'});

  const { data, error } = await sb.from('transactions').insert({
    user_id: currentUser.id,
    type: currentType,
    category: selectedCat,
    icon: cat?.icon || '💰',
    amount: amt,
    note: note || null,
    date: dateStr
  }).select().single();

  btn.disabled = false; btn.textContent = origText;

  if(error) { alert('Gagal simpan: ' + error.message); return; }

  transactions.unshift(data);
  document.getElementById('amtInp').value = '';
  document.getElementById('noteInp').value = '';
  renderAll();
}

async function deleteTransaction(id) {
  if(!confirm('Hapus transaksi ini?')) return;
  const { error } = await sb.from('transactions').delete().eq('id', id).eq('user_id', currentUser.id);
  if(error) { alert('Gagal hapus!'); return; }
  transactions = transactions.filter(t => t.id !== id);
  renderAll();
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function setFilter(f, el) {
  txFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTxList();
}

function renderAll() {
  let totalIn = 0, totalOut = 0;
  transactions.forEach(t => t.type==='income' ? (totalIn+=t.amount) : (totalOut+=t.amount));
  document.getElementById('totalIncome').textContent = fmtRp(totalIn);
  document.getElementById('totalExpense').textContent = fmtRp(totalOut);
  const bal = totalIn - totalOut;
  const balEl = document.getElementById('totalBalance');
  balEl.textContent = (bal < 0 ? '-' : '') + fmtRp(bal);
  balEl.className = 'sum-val bal' + (bal < 0 ? ' neg' : '');
  renderTxList();
  drawPie();
}

function renderTxList() {
  const filtered = txFilter==='all' ? transactions : transactions.filter(t => t.type===txFilter);
  const list = document.getElementById('txList');
  if(!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">${txFilter==='income'?'💚':txFilter==='expense'?'🔴':'🗒️'}</div>Belum ada transaksi.<br>Tambahkan transaksi pertamamu!</div>`;
    return;
  }
  list.innerHTML = filtered.slice(0, 50).map(t => `
    <div class="tx-item">
      <div class="tx-icon-wrap ${t.type==='income'?'inc-bg':'exp-bg'}">${t.icon}</div>
      <div class="tx-info">
        <div class="tx-cat">${t.category}</div>
        <div class="tx-note">${t.note || (t.type==='income'?'Pemasukan':'Pengeluaran')}</div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${fmtRp(t.amount)}</div>
        <div class="tx-date">${t.date || ''}</div>
      </div>
      <button class="tx-del" onclick="deleteTransaction(${t.id})" title="Hapus">✕</button>
    </div>
  `).join('');
}

function drawPie() {
  const canvas = document.getElementById('pieCanvas');
  const ctx = canvas.getContext('2d');
  const S = 200; canvas.width = S; canvas.height = S;
  const cx = S/2, cy = S/2, R = 82, inner = 48;
  ctx.clearRect(0, 0, S, S);

  // Aggregate
  const map = {};
  transactions.forEach(t => {
    if(!map[t.category]) map[t.category] = { total:0, icon:t.icon };
    map[t.category].total += t.amount;
  });

  const total = transactions.reduce((s,t) => s+t.amount, 0);

  if(!total) {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#12121a';
    ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5050a0'; ctx.textAlign = 'center'; ctx.font = '11px Sora';
    ctx.fillText('Belum ada data', cx, cy+4);
    document.getElementById('pieLegend').innerHTML = '';
    return;
  }

  const entries = Object.entries(map)
    .map(([cat,v],i) => ({ cat, total:v.total, icon:v.icon, color:PIE_COLORS[i%PIE_COLORS.length] }))
    .sort((a,b) => b.total - a.total);

  let angle = -Math.PI/2;
  entries.forEach(e => {
    const slice = (e.total/total) * Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle = e.color; ctx.fill();
    ctx.strokeStyle = '#0a0a0f'; ctx.lineWidth = 2.5; ctx.stroke();
    angle += slice;
  });

  // Inner circle
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle = '#12121a'; ctx.fill();

  // Center text
  ctx.textAlign = 'center';
  ctx.font = '600 10px Sora'; ctx.fillStyle = '#5050a0';
  ctx.fillText('TOTAL', cx, cy-6);
  ctx.font = '700 12px JetBrains Mono'; ctx.fillStyle = '#7c6bff';
  ctx.fillText(fmtShort(total), cx, cy+10);

  // Legend
  document.getElementById('pieLegend').innerHTML = entries.slice(0,9).map(e => `
    <div class="legend-item">
      <div class="leg-left">
        <div class="leg-dot" style="background:${e.color}"></div>
        <span class="leg-name">${e.icon} ${e.cat.replace(/^[^\s]+\s/,'')}</span>
      </div>
      <span class="leg-pct" style="color:${e.color}">${((e.total/total)*100).toFixed(1)}%</span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  showLoad('Memeriksa sesi...');
  const { data: { session } } = await sb.auth.getSession();
  if(session) {
    currentUser = session.user;
    // Ambil username dari profiles
    const { data: prof } = await sb.from('profiles').select('username').eq('id', currentUser.id).single();
    currentUsername = prof?.username || currentUser.email.replace('@dompetku.app','');
    await enterApp();
  } else {
    hideLoad();
    showPage('login');
  }

  // Listen auth changes
  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_OUT') {
      currentUser = null; currentUsername = ''; transactions = [];
      showPage('login');
    }
  });
}

init();
</script>
