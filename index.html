<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeuanganKu — Catat Pemasukan & Pengeluaran</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0e17;
    --bg2: #1a1825;
    --bg3: #241f35;
    --card: #1e1b2e;
    --card2: #2a2540;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --green: #34d399;
    --green2: #059669;
    --red: #f87171;
    --red2: #dc2626;
    --amber: #fbbf24;
    --text: #f0eeff;
    --text2: #a89ec4;
    --text3: #6b6385;
    --border: rgba(167,139,250,0.15);
    --border2: rgba(167,139,250,0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; right: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(52,211,153,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== AUTH ===== */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    background: var(--bg);
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow), 0 0 80px rgba(124,58,237,0.1);
    animation: fadeUp 0.5s ease;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo .logo-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
  }
  .auth-logo h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .auth-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .auth-tabs {
    display: flex;
    background: var(--bg2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1; padding: 10px; border: none; background: none;
    color: var(--text2); font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; border-radius: 9px; transition: all 0.2s;
  }
  .auth-tab.active {
    background: var(--card2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .form-group input {
    width: 100%; padding: 12px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: inherit; font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: white; font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.5); }
  .btn-primary:active { transform: translateY(0); }
  .auth-msg { font-size: 13px; color: var(--red); text-align: center; margin-top: 12px; min-height: 18px; }

  /* ===== APP ===== */
  #app-screen { display: none; min-height: 100vh; position: relative; z-index: 1; }

  /* navbar */
  .navbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,14,23,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border2);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .navbar-brand { display: flex; align-items: center; gap: 10px; }
  .navbar-brand .logo-sm {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .navbar-brand span { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .navbar-right { display: flex; align-items: center; gap: 12px; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
  }
  .user-chip .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .btn-logout {
    padding: 7px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text2); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* main */
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* summary cards */
  .summary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 32px;
  }
  .sum-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px 24px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .sum-card:hover { border-color: var(--border); }
  .sum-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 3px 3px 0 0;
  }
  .sum-card.balance::before { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .sum-card.income::before { background: linear-gradient(90deg, var(--green2), var(--green)); }
  .sum-card.expense::before { background: linear-gradient(90deg, var(--red2), var(--red)); }
  .sum-label { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .sum-value { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .sum-card.balance .sum-value { color: var(--accent); }
  .sum-card.income .sum-value { color: var(--green); }
  .sum-card.expense .sum-value { color: var(--red); }
  .sum-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* two col layout */
  .layout-grid {
    display: grid; grid-template-columns: 1fr 380px; gap: 20px;
    align-items: start;
  }

  /* form card */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 28px;
  }
  .card-title {
    font-size: 16px; font-weight: 700; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
  }

  /* type toggle */
  .type-toggle {
    display: flex; background: var(--bg2); border-radius: 10px; padding: 4px;
    margin-bottom: 20px;
  }
  .type-btn {
    flex: 1; padding: 9px; border: none; background: none;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; border-radius: 8px; transition: all 0.2s;
    color: var(--text3);
  }
  .type-btn.income.active { background: rgba(52,211,153,0.15); color: var(--green); }
  .type-btn.expense.active { background: rgba(248,113,113,0.15); color: var(--red); }

  /* form elements */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-field { margin-bottom: 12px; }
  .form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 11px 14px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); }
  .form-field select option { background: var(--bg2); }
  .form-field textarea { resize: vertical; min-height: 70px; }
  .input-prefix {
    position: relative;
  }
  .input-prefix span {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 14px; font-weight: 600;
  }
  .input-prefix input { padding-left: 36px; }
  .btn-add {
    width: 100%; padding: 13px;
    border: none; border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-add.income { background: linear-gradient(135deg, var(--green2), var(--green)); color: white; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
  .btn-add.expense { background: linear-gradient(135deg, var(--red2), var(--red)); color: white; box-shadow: 0 4px 16px rgba(248,113,113,0.3); }
  .btn-add:hover { transform: translateY(-1px); }

  /* right col: chart + filter */
  .right-col { display: flex; flex-direction: column; gap: 16px; }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
  }
  .chart-tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
  }
  .chart-tab {
    padding: 6px 14px; border-radius: 8px;
    background: var(--bg2); border: 1px solid var(--border2);
    color: var(--text2); font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .chart-tab.active { background: var(--bg3); border-color: var(--border); color: var(--text); }
  .chart-wrap { position: relative; height: 220px; }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    margin-top: 16px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text2);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .chart-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: var(--text3); font-size: 14px; gap: 8px;
  }
  .chart-empty .big-icon { font-size: 40px; }

  /* filter */
  .filter-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .filter-row { display: flex; gap: 8px; }
  .filter-row select {
    flex: 1; padding: 9px 12px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
  }

  /* transactions */
  .transactions-section { margin-top: 24px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 18px; font-weight: 700; }
  .tx-count { font-size: 13px; color: var(--text3); }
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease;
  }
  .tx-item:hover { border-color: var(--border); transform: translateX(2px); }
  .tx-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .tx-icon.income { background: rgba(52,211,153,0.12); }
  .tx-icon.expense { background: rgba(248,113,113,0.12); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .tx-note { font-size: 11px; color: var(--text3); font-style: italic; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tx-del {
    width: 30px; height: 30px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border2);
    color: var(--text3); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .tx-del:hover { background: rgba(248,113,113,0.1); border-color: var(--red); color: var(--red); }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 14px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
  }
  .badge.income { background: rgba(52,211,153,0.12); color: var(--green); }
  .badge.expense { background: rgba(248,113,113,0.12); color: var(--red); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 900px) {
    .layout-grid { grid-template-columns: 1fr; }
    .right-col { order: -1; }
    .summary-grid { grid-template-columns: 1fr; }
    .summary-grid .sum-card { display: flex; justify-content: space-between; align-items: center; }
    .summary-grid .sum-card .sum-label { margin-bottom: 0; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h1>KeuanganKu</h1>
      <p>Catat & kelola keuangan pribadimu</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Masuk</button>
      <button class="auth-tab" onclick="switchAuth('register')">Daftar</button>
    </div>
    <div id="auth-form">
      <div class="form-group" id="name-field" style="display:none">
        <label>Nama Lengkap</label>
        <input type="text" id="input-name" placeholder="Nama kamu">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="email@contoh.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="input-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="auth-btn" onclick="doAuth()">Masuk</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-sm">💰</div>
      <span>KeuanganKu</span>
    </div>
    <div class="navbar-right">
      <div class="user-chip">
        <div class="avatar" id="nav-avatar">U</div>
        <span id="nav-username">User</span>
      </div>
      <button class="btn-logout" onclick="logout()">Keluar</button>
    </div>
  </nav>

  <div class="main">
    <!-- Summary -->
    <div class="summary-grid">
      <div class="sum-card balance">
        <div class="sum-label">Saldo Saat Ini</div>
        <div class="sum-value" id="sum-balance">Rp 0</div>
        <div class="sum-sub" id="sum-txcount">0 transaksi</div>
      </div>
      <div class="sum-card income">
        <div class="sum-label">Total Pemasukan</div>
        <div class="sum-value" id="sum-income">Rp 0</div>
        <div class="sum-sub" id="sum-incomecount">0 transaksi</div>
      </div>
      <div class="sum-card expense">
        <div class="sum-label">Total Pengeluaran</div>
        <div class="sum-value" id="sum-expense">Rp 0</div>
        <div class="sum-sub" id="sum-expcount">0 transaksi</div>
      </div>
    </div>

    <div class="layout-grid">
      <!-- LEFT: Form -->
      <div>
        <div class="form-card">
          <div class="card-title"><div class="dot"></div> Tambah Transaksi</div>
          <div class="type-toggle">
            <button class="type-btn income active" id="btn-income" onclick="setType('income')">📈 Pemasukan</button>
            <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">📉 Pengeluaran</button>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Jumlah (Rp)</label>
              <div class="input-prefix">
                <span>Rp</span>
                <input type="number" id="input-amount" placeholder="50000" min="0">
              </div>
            </div>
            <div class="form-field">
              <label>Tanggal</label>
              <input type="date" id="input-date">
            </div>
          </div>
          <div class="form-field">
            <label>Kategori</label>
            <select id="input-category">
              <option value="">Pilih kategori...</option>
            </select>
          </div>
          <div class="form-field">
            <label>Keterangan (opsional)</label>
            <input type="text" id="input-note" placeholder="Mis: makan siang sama teman">
          </div>
          <button class="btn-add income" id="btn-add" onclick="addTransaction()">+ Tambah Pemasukan</button>
        </div>
      </div>

      <!-- RIGHT: Chart + Filter -->
      <div class="right-col">
        <div class="chart-card">
          <div class="chart-tabs">
            <button class="chart-tab active" onclick="setChartType('expense')">Pengeluaran</button>
            <button class="chart-tab" onclick="setChartType('income')">Pemasukan</button>
          </div>
          <div class="chart-wrap" id="chart-wrap">
            <div class="chart-empty" id="chart-empty">
              <div class="big-icon">📊</div>
              <div>Belum ada data</div>
            </div>
            <canvas id="donut-chart" style="display:none"></canvas>
          </div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>

        <div class="filter-card">
          <div class="card-title" style="margin-bottom:14px"><div class="dot"></div> Filter</div>
          <div class="filter-row">
            <select id="filter-type" onchange="renderTransactions()">
              <option value="all">Semua Tipe</option>
              <option value="income">Pemasukan</option>
              <option value="expense">Pengeluaran</option>
            </select>
            <select id="filter-cat" onchange="renderTransactions()">
              <option value="all">Semua Kategori</option>
            </select>
            <select id="filter-month" onchange="renderTransactions()">
              <option value="all">Semua Bulan</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Transactions -->
    <div class="transactions-section">
      <div class="section-header">
        <div class="section-title">Riwayat Transaksi</div>
        <div class="tx-count" id="tx-count-label">Menampilkan 0 transaksi</div>
      </div>
      <div class="tx-list" id="tx-list"></div>
    </div>
  </div>
</div>

<script>
const INCOME_CATS = [
  { id: 'gaji', label: 'Gaji / Upah', icon: '💼' },
  { id: 'freelance', label: 'Freelance', icon: '💻' },
  { id: 'bisnis', label: 'Bisnis', icon: '🏪' },
  { id: 'investasi', label: 'Investasi', icon: '📈' },
  { id: 'hadiah', label: 'Hadiah / Bonus', icon: '🎁' },
  { id: 'transfer_masuk', label: 'Transfer Masuk', icon: '💸' },
  { id: 'lainnya_masuk', label: 'Lainnya', icon: '💰' },
];
const EXPENSE_CATS = [
  { id: 'nabung', label: 'Nabung / Tabungan', icon: '🐷' },
  { id: 'makan', label: 'Makan & Minum', icon: '🍜' },
  { id: 'jajan', label: 'Jajan / Snack', icon: '🍡' },
  { id: 'transport', label: 'Transportasi', icon: '🚌' },
  { id: 'belanja', label: 'Belanja', icon: '🛍️' },
  { id: 'tagihan', label: 'Tagihan & Utilitas', icon: '💡' },
  { id: 'kesehatan', label: 'Kesehatan', icon: '⚕️' },
  { id: 'hiburan', label: 'Hiburan', icon: '🎮' },
  { id: 'pendidikan', label: 'Pendidikan', icon: '📚' },
  { id: 'sosial', label: 'Sosial / Donasi', icon: '🤝' },
  { id: 'lainnya_keluar', label: 'Lainnya', icon: '💲' },
];

const CHART_COLORS = [
  '#a78bfa','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#4ade80','#fb923c','#a3e635','#22d3ee','#e879f9'
];

let currentUser = null;
let currentType = 'income';
let currentChartType = 'expense';
let donutChart = null;
let authMode = 'login';

// ===== STORAGE =====
function getUsers() { return JSON.parse(localStorage.getItem('kk_users') || '{}'); }
function saveUsers(u) { localStorage.setItem('kk_users', JSON.stringify(u)); }
function getTxKey() { return 'kk_tx_' + currentUser; }
function getTx() { return JSON.parse(localStorage.getItem(getTxKey()) || '[]'); }
function saveTx(txs) { localStorage.setItem(getTxKey(), JSON.stringify(txs)); }

// ===== AUTH =====
function switchAuth(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('name-field').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Masuk' : 'Buat Akun';
  document.getElementById('auth-msg').textContent = '';
}

function doAuth() {
  const email = document.getElementById('input-email').value.trim();
  const pass = document.getElementById('input-pass').value;
  const name = document.getElementById('input-name').value.trim();
  const msg = document.getElementById('auth-msg');

  if (!email || !pass) { msg.textContent = 'Email dan password wajib diisi'; return; }

  const users = getUsers();

  if (authMode === 'register') {
    if (!name) { msg.textContent = 'Nama lengkap wajib diisi'; return; }
    if (users[email]) { msg.textContent = 'Email sudah terdaftar'; return; }
    if (pass.length < 6) { msg.textContent = 'Password minimal 6 karakter'; return; }
    users[email] = { name, pass };
    saveUsers(users);
    msg.style.color = '#34d399';
    msg.textContent = 'Akun berhasil dibuat! Silakan masuk.';
    setTimeout(() => { msg.style.color = ''; switchAuth('login'); }, 1500);
    return;
  }

  if (!users[email]) { msg.textContent = 'Email tidak ditemukan'; return; }
  if (users[email].pass !== pass) { msg.textContent = 'Password salah'; return; }

  currentUser = email;
  document.getElementById('nav-username').textContent = users[email].name.split(' ')[0];
  document.getElementById('nav-avatar').textContent = users[email].name[0].toUpperCase();
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';

  initDate();
  updateCategories();
  renderAll();
}

function logout() {
  currentUser = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('input-email').value = '';
  document.getElementById('input-pass').value = '';
  document.getElementById('auth-msg').textContent = '';
}

// ===== TYPE =====
function setType(type) {
  currentType = type;
  document.getElementById('btn-income').classList.toggle('active', type === 'income');
  document.getElementById('btn-expense').classList.toggle('active', type === 'expense');
  const btn = document.getElementById('btn-add');
  btn.className = 'btn-add ' + type;
  btn.textContent = type === 'income' ? '+ Tambah Pemasukan' : '+ Tambah Pengeluaran';
  updateCategories();
}

function updateCategories() {
  const sel = document.getElementById('input-category');
  const cats = currentType === 'income' ? INCOME_CATS : EXPENSE_CATS;
  sel.innerHTML = '<option value="">Pilih kategori...</option>' + cats.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
}

// ===== DATE =====
function initDate() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('input-date').value = today;
}

// ===== ADD TX =====
function addTransaction() {
  const amount = parseFloat(document.getElementById('input-amount').value);
  const date = document.getElementById('input-date').value;
  const cat = document.getElementById('input-category').value;
  const note = document.getElementById('input-note').value.trim();

  if (!amount || amount <= 0) { alert('Masukkan jumlah yang valid'); return; }
  if (!date) { alert('Pilih tanggal'); return; }
  if (!cat) { alert('Pilih kategori'); return; }

  const cats = currentType === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const catObj = cats.find(c => c.id === cat);

  const tx = {
    id: Date.now(),
    type: currentType,
    amount,
    date,
    category: cat,
    categoryLabel: catObj ? catObj.label : cat,
    categoryIcon: catObj ? catObj.icon : '💲',
    note,
  };

  const txs = getTx();
  txs.unshift(tx);
  saveTx(txs);

  document.getElementById('input-amount').value = '';
  document.getElementById('input-note').value = '';
  document.getElementById('input-category').value = '';

  renderAll();
}

// ===== DELETE =====
function deleteTx(id) {
  const txs = getTx().filter(t => t.id !== id);
  saveTx(txs);
  renderAll();
}

// ===== FORMAT =====
function formatRp(n) {
  return 'Rp ' + Math.abs(n).toLocaleString('id-ID');
}
function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

// ===== RENDER ALL =====
function renderAll() {
  renderSummary();
  renderTransactions();
  renderChart();
  populateFilters();
}

function renderSummary() {
  const txs = getTx();
  const income = txs.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
  const expense = txs.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
  document.getElementById('sum-balance').textContent = formatRp(income - expense);
  document.getElementById('sum-income').textContent = formatRp(income);
  document.getElementById('sum-expense').textContent = formatRp(expense);
  document.getElementById('sum-txcount').textContent = txs.length + ' transaksi total';
  document.getElementById('sum-incomecount').textContent = txs.filter(t=>t.type==='income').length + ' transaksi';
  document.getElementById('sum-expcount').textContent = txs.filter(t=>t.type==='expense').length + ' transaksi';
}

function renderTransactions() {
  const filterType = document.getElementById('filter-type').value;
  const filterCat = document.getElementById('filter-cat').value;
  const filterMonth = document.getElementById('filter-month').value;

  let txs = getTx();
  if (filterType !== 'all') txs = txs.filter(t => t.type === filterType);
  if (filterCat !== 'all') txs = txs.filter(t => t.category === filterCat);
  if (filterMonth !== 'all') txs = txs.filter(t => t.date.startsWith(filterMonth));

  document.getElementById('tx-count-label').textContent = `Menampilkan ${txs.length} transaksi`;

  const el = document.getElementById('tx-list');
  if (!txs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>Belum ada transaksi</div></div>';
    return;
  }

  el.innerHTML = txs.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${t.categoryIcon}</div>
      <div class="tx-info">
        <div class="tx-name">${t.categoryLabel}</div>
        <div class="tx-cat"><span class="badge ${t.type}">${t.type==='income'?'Pemasukan':'Pengeluaran'}</span></div>
        ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
      </div>
      <div class="tx-right">
        <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'} ${formatRp(t.amount)}</div>
        <div class="tx-date">${formatDate(t.date)}</div>
      </div>
      <button class="tx-del" onclick="deleteTx(${t.id})" title="Hapus">✕</button>
    </div>
  `).join('');
}

function setChartType(type) {
  currentChartType = type;
  document.querySelectorAll('.chart-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&type==='expense')||(i===1&&type==='income')));
  renderChart();
}

function renderChart() {
  const txs = getTx().filter(t => t.type === currentChartType);
  const bycat = {};
  txs.forEach(t => {
    bycat[t.categoryLabel] = (bycat[t.categoryLabel] || 0) + t.amount;
  });

  const labels = Object.keys(bycat);
  const data = Object.values(bycat);
  const total = data.reduce((s,v) => s+v, 0);
  const empty = document.getElementById('chart-empty');
  const canvas = document.getElementById('donut-chart');
  const legend = document.getElementById('chart-legend');

  if (!labels.length) {
    empty.style.display = 'flex';
    canvas.style.display = 'none';
    legend.innerHTML = '';
    if (donutChart) { donutChart.destroy(); donutChart = null; }
    return;
  }

  empty.style.display = 'none';
  canvas.style.display = 'block';

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: labels.map((_,i) => CHART_COLORS[i % CHART_COLORS.length]),
        borderWidth: 3,
        borderColor: '#1e1b2e',
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${formatRp(ctx.raw)} (${((ctx.raw/total)*100).toFixed(1)}%)`,
          },
          backgroundColor: '#1e1b2e',
          titleColor: '#f0eeff',
          bodyColor: '#a89ec4',
          borderColor: 'rgba(167,139,250,0.3)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 10,
        }
      }
    }
  });

  legend.innerHTML = labels.map((l,i) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></div>
      <span>${l} <span style="color:var(--text3)">(${((data[i]/total)*100).toFixed(0)}%)</span></span>
    </div>
  `).join('');
}

function populateFilters() {
  const txs = getTx();
  const cats = [...new Set(txs.map(t => t.category))];
  const months = [...new Set(txs.map(t => t.date.substring(0,7)))].sort().reverse();
  const monthNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  const curCat = document.getElementById('filter-cat').value;
  const curMonth = document.getElementById('filter-month').value;

  document.getElementById('filter-cat').innerHTML = '<option value="all">Semua Kategori</option>' +
    cats.map(c => {
      const all = [...INCOME_CATS, ...EXPENSE_CATS];
      const obj = all.find(x => x.id === c);
      return `<option value="${c}" ${curCat===c?'selected':''}>${obj?obj.icon+' '+obj.label:c}</option>`;
    }).join('');

  document.getElementById('filter-month').innerHTML = '<option value="all">Semua Bulan</option>' +
    months.map(m => {
      const [y,mo] = m.split('-');
      return `<option value="${m}" ${curMonth===m?'selected':''}>${monthNames[parseInt(mo)-1]} ${y}</option>`;
    }).join('');
}

// Init
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') doAuth(); });
</script>
</body>
</html>
