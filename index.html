<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeuanganKu</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0b0a14;--bg2:#131220;--bg3:#1a1829;--card:#161524;--card2:#1f1d30;--accent:#a78bfa;--accent2:#7c3aed;--green:#34d399;--green2:#059669;--red:#f87171;--red2:#dc2626;--text:#f0eeff;--text2:#9b93b8;--text3:#5c5478;--border:rgba(167,139,250,.18);--border2:rgba(167,139,250,.07);--r:16px;--rs:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.blob1{position:fixed;top:-180px;left:-180px;width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.blob2{position:fixed;bottom:-120px;right:-120px;width:420px;height:420px;background:radial-gradient(circle,rgba(52,211,153,.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px;}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
#loading p{font-size:14px;color:var(--text2);}
#auth-screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 36px;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:fadeUp .45s ease;}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-icon{width:64px;height:64px;margin:0 auto 14px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 28px rgba(124,58,237,.45);}
.auth-logo h1{font-size:22px;font-weight:800;letter-spacing:-.4px;}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
.auth-tab{flex:1;padding:10px;border:none;background:none;color:var(--text2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border-radius:9px;transition:all .2s;}
.auth-tab.active{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.fg input{width:100%;padding:12px 15px;background:var(--bg2);border:1px solid var(--border2);border-radius:11px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--accent);}
.fg input::placeholder{color:var(--text3);}
.btn-auth{width:100%;padding:13px;margin-top:6px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 18px rgba(124,58,237,.45);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.55);}
.btn-auth:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-msg{min-height:20px;text-align:center;font-size:13px;margin-top:12px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--green);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
#app-screen{display:none;min-height:100vh;position:relative;z-index:1;}
.navbar{position:sticky;top:0;z-index:50;background:rgba(11,10,20,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);height:62px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.nb-brand{display:flex;align-items:center;gap:10px;}
.nb-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.nb-brand span{font-size:17px;font-weight:800;}
.nb-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);padding:5px 12px;border-radius:100px;font-size:13px;font-weight:500;}
.av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.btn-out{padding:7px 13px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.sc{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .2s;}
.sc:hover{border-color:var(--border);}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.sc.bal::after{background:linear-gradient(90deg,var(--accent2),var(--accent));}
.sc.inc::after{background:linear-gradient(90deg,var(--green2),var(--green));}
.sc.exp::after{background:linear-gradient(90deg,var(--red2),var(--red));}
.sc-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.sc-val{font-size:24px;font-weight:800;letter-spacing:-.4px;}
.sc.bal .sc-val{color:var(--accent);}
.sc.inc .sc-val{color:var(--green);}
.sc.exp .sc-val{color:var(--red);}
.sc-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.lg{display:grid;grid-template-columns:1fr 370px;gap:18px;align-items:start;}
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:26px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.type-tog{display:flex;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:18px;gap:4px;}
.type-btn{flex:1;padding:9px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border-radius:7px;transition:all .2s;color:var(--text3);}
.type-btn.income.active{background:rgba(52,211,153,.13);color:var(--green);}
.type-btn.expense.active{background:rgba(248,113,113,.13);color:var(--red);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ff{margin-bottom:10px;}
.ff label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.ff input,.ff select{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
.ff input:focus,.ff select:focus{border-color:var(--accent);}
.ff select option{background:var(--bg2);}
.rp-w{position:relative;}
.rp-w span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;font-weight:600;pointer-events:none;}
.rp-w input{padding-left:34px;}
.btn-add{width:100%;padding:12px;border:none;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-add.income{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:0 4px 16px rgba(52,211,153,.28);}
.btn-add.expense{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;box-shadow:0 4px 16px rgba(248,113,113,.28);}
.btn-add:hover{transform:translateY(-1px);}
.btn-add:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.rcol{display:flex;flex-direction:column;gap:14px;}
.chart-tabs{display:flex;gap:6px;margin-bottom:16px;}
.cht{padding:6px 13px;border-radius:8px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.cht.active{background:var(--bg3);border-color:var(--border);color:var(--text);}
.chart-wrap{position:relative;height:210px;}
.chart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px;}
.chart-empty .bi{font-size:38px;}
.clegend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:14px;}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.cld{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.filter-row{display:flex;gap:8px;}
.filter-row select{flex:1;padding:8px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.tx-sec{margin-top:22px;}
.tx-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.tx-title{font-size:17px;font-weight:700;}
.tx-ct{font-size:12px;color:var(--text3);}
.tx-list{display:flex;flex-direction:column;gap:7px;}
.txi{background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);padding:13px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s,transform .15s;animation:fadeUp .25s ease;}
.txi:hover{border-color:var(--border);transform:translateX(2px);}
.txi-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.txi-icon.income{background:rgba(52,211,153,.1);}
.txi-icon.expense{background:rgba(248,113,113,.1);}
.txi-info{flex:1;min-width:0;}
.txi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.txi-note{font-size:11px;color:var(--text3);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}
.txi-right{text-align:right;flex-shrink:0;}
.txi-amt{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.txi-amt.income{color:var(--green);}
.txi-amt.expense{color:var(--red);}
.txi-date{font-size:11px;color:var(--text3);margin-top:2px;}
.del-btn{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.del-btn:hover{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;}
.badge.income{background:rgba(52,211,153,.1);color:var(--green);}
.badge.expense{background:rgba(248,113,113,.1);color:var(--red);}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px;}
.empty-icon{font-size:44px;margin-bottom:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:860px){.lg{grid-template-columns:1fr;}.rcol{order:-1;}.sum-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="blob1"></div><div class="blob2"></div>
<div id="loading"><div class="sp"></div><p>Memuat KeuanganKu...</p></div>
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-icon">💰</div>
        <h1>KeuanganKu</h1>
        <p>Catat keuangan pribadimu, dari mana saja</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
        <button class="auth-tab" onclick="switchTab('register')">Daftar</button>
      </div>
      <div id="field-name" class="fg" style="display:none">
        <label>Nama Lengkap</label>
        <input type="text" id="inp-name" placeholder="Nama kamu">
      </div>
      <div class="fg"><label>Email</label><input type="email" id="inp-email" placeholder="email@contoh.com"></div>
      <div class="fg"><label>Password</label><input type="password" id="inp-pass" placeholder="Min. 6 karakter"></div>
      <button class="btn-auth" id="auth-btn" onclick="doAuth()"><span id="auth-btn-txt">Masuk</span></button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>
</div>
<div id="app-screen">
  <nav class="navbar">
    <div class="nb-brand"><div class="nb-icon">💰</div><span>KeuanganKu</span></div>
    <div class="nb-right">
      <div class="user-chip"><div class="av" id="nav-av">U</div><span id="nav-name">User</span></div>
      <button class="btn-out" onclick="doLogout()">Keluar</button>
    </div>
  </nav>
  <div class="main">
    <div class="sum-grid">
      <div class="sc bal"><div class="sc-lbl">Saldo</div><div class="sc-val" id="s-bal">Rp 0</div><div class="sc-sub" id="s-tot">0 transaksi</div></div>
      <div class="sc inc"><div class="sc-lbl">Pemasukan</div><div class="sc-val" id="s-inc">Rp 0</div><div class="sc-sub" id="s-incc">0 transaksi</div></div>
      <div class="sc exp"><div class="sc-lbl">Pengeluaran</div><div class="sc-val" id="s-exp">Rp 0</div><div class="sc-sub" id="s-expc">0 transaksi</div></div>
    </div>
    <div class="lg">
      <div>
        <div class="card">
          <div class="card-title"><div class="cdot"></div>Tambah Transaksi</div>
          <div class="type-tog">
            <button class="type-btn income active" id="tbtn-inc" onclick="setType('income')">📈 Pemasukan</button>
            <button class="type-btn expense" id="tbtn-exp" onclick="setType('expense')">📉 Pengeluaran</button>
          </div>
          <div class="frow">
            <div class="ff"><label>Jumlah (Rp)</label><div class="rp-w"><span>Rp</span><input type="number" id="inp-amount" placeholder="50000" min="0"></div></div>
            <div class="ff"><label>Tanggal</label><input type="date" id="inp-date"></div>
          </div>
          <div class="ff"><label>Kategori</label><select id="inp-cat"><option value="">Pilih kategori...</option></select></div>
          <div class="ff"><label>Keterangan (opsional)</label><input type="text" id="inp-note" placeholder="Mis: makan siang sama teman"></div>
          <button class="btn-add income" id="btn-add" onclick="addTx()"><span id="add-txt">+ Tambah Pemasukan</span></button>
        </div>
      </div>
      <div class="rcol">
        <div class="card">
          <div class="chart-tabs">
            <button class="cht active" onclick="setChart('expense')">Pengeluaran</button>
            <button class="cht" onclick="setChart('income')">Pemasukan</button>
          </div>
          <div class="chart-wrap">
            <div class="chart-empty" id="chart-empty"><div class="bi">📊</div><div>Belum ada data</div></div>
            <canvas id="donut" style="display:none"></canvas>
          </div>
          <div class="clegend" id="clegend"></div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:12px"><div class="cdot"></div>Filter</div>
          <div class="filter-row">
            <select id="f-type" onchange="renderTx()"><option value="all">Semua Tipe</option><option value="income">Pemasukan</option><option value="expense">Pengeluaran</option></select>
            <select id="f-cat" onchange="renderTx()"><option value="all">Semua Kategori</option></select>
            <select id="f-month" onchange="renderTx()"><option value="all">Semua Bulan</option></select>
          </div>
        </div>
      </div>
    </div>
    <div class="tx-sec">
      <div class="tx-hd"><div class="tx-title">Riwayat Transaksi</div><div class="tx-ct" id="tx-ct">0 transaksi</div></div>
      <div class="tx-list" id="tx-list"></div>
    </div>
  </div>
</div>
<script>
const SURL='https://azagkgqtsfazptxmjufw.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6YWdrZ3F0c2ZhenB0eG1qdWZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTQyNzMsImV4cCI6MjA5MDEzMDI3M30.v6HeS5addLL4AiSzyPG87y85v_Mz8BS_-INc6K1ZA_Q';
const db=supabase.createClient(SURL,SKEY);
const INC=[{id:'gaji',label:'Gaji / Upah',icon:'💼'},{id:'freelance',label:'Freelance',icon:'💻'},{id:'bisnis',label:'Bisnis',icon:'🏪'},{id:'investasi',label:'Investasi',icon:'📈'},{id:'hadiah',label:'Hadiah / Bonus',icon:'🎁'},{id:'transfer_masuk',label:'Transfer Masuk',icon:'💸'},{id:'lain_masuk',label:'Lainnya',icon:'💰'}];
const EXP=[{id:'nabung',label:'Nabung',icon:'🐷'},{id:'makan',label:'Makan & Minum',icon:'🍜'},{id:'jajan',label:'Jajan / Snack',icon:'🍡'},{id:'transport',label:'Transportasi',icon:'🚌'},{id:'belanja',label:'Belanja',icon:'🛍️'},{id:'tagihan',label:'Tagihan',icon:'💡'},{id:'kesehatan',label:'Kesehatan',icon:'⚕️'},{id:'hiburan',label:'Hiburan',icon:'🎮'},{id:'pendidikan',label:'Pendidikan',icon:'📚'},{id:'sosial',label:'Sosial / Donasi',icon:'🤝'},{id:'lain_keluar',label:'Lainnya',icon:'💲'}];
const COLORS=['#a78bfa','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#4ade80','#fb923c','#a3e635','#22d3ee','#e879f9'];
let curType='income',curChart='expense',donutChart=null,txCache=[],authMode='login';

async function init(){
  const {data:{session}}=await db.auth.getSession();
  document.getElementById('loading').style.display='none';
  if(session) enterApp(session.user);
  else document.getElementById('auth-screen').style.display='flex';
  db.auth.onAuthStateChange((_,s)=>{
    if(s) enterApp(s.user);
    else{document.getElementById('app-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';txCache=[];}
  });
}

function enterApp(user){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('nav-name').textContent=name.split(' ')[0];
  document.getElementById('nav-av').textContent=name[0].toUpperCase();
  document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
  updateCats();loadTx();
}

function switchTab(m){
  authMode=m;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='login')||(i===1&&m==='register')));
  document.getElementById('field-name').style.display=m==='register'?'block':'none';
  document.getElementById('auth-btn-txt').textContent=m==='login'?'Masuk':'Buat Akun';
  setMsg('','');
}
function setMsg(t,c){const e=document.getElementById('auth-msg');e.textContent=t;e.className='auth-msg'+(c?' '+c:'');}

async function doAuth(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const name=document.getElementById('inp-name').value.trim();
  const btn=document.getElementById('auth-btn');
  if(!email||!pass){setMsg('Email dan password wajib diisi','err');return;}
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  if(authMode==='register'){
    if(!name){setMsg('Nama lengkap wajib diisi','err');btn.disabled=false;btn.innerHTML='<span>Buat Akun</span>';return;}
    const {error}=await db.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
    if(error) setMsg(error.message,'err');
    else setMsg('Akun berhasil dibuat! Cek email untuk verifikasi lalu masuk.','ok');
  }else{
    const {error}=await db.auth.signInWithPassword({email,password:pass});
    if(error) setMsg('Email atau password salah','err');
  }
  btn.disabled=false;btn.innerHTML=`<span>${authMode==='login'?'Masuk':'Buat Akun'}</span>`;
}
async function doLogout(){await db.auth.signOut();}

function setType(t){
  curType=t;
  document.getElementById('tbtn-inc').classList.toggle('active',t==='income');
  document.getElementById('tbtn-exp').classList.toggle('active',t==='expense');
  document.getElementById('btn-add').className='btn-add '+t;
  document.getElementById('add-txt').textContent=t==='income'?'+ Tambah Pemasukan':'+ Tambah Pengeluaran';
  updateCats();
}
function updateCats(){
  const cats=curType==='income'?INC:EXP;
  document.getElementById('inp-cat').innerHTML='<option value="">Pilih kategori...</option>'+cats.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
}

async function loadTx(){
  const {data,error}=await db.from('transactions').select('*').order('date',{ascending:false}).order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  txCache=data||[];renderAll();
}

async function addTx(){
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const date=document.getElementById('inp-date').value;
  const cat=document.getElementById('inp-cat').value;
  const note=document.getElementById('inp-note').value.trim();
  if(!amount||amount<=0){alert('Masukkan jumlah yang valid');return;}
  if(!date){alert('Pilih tanggal');return;}
  if(!cat){alert('Pilih kategori');return;}
  const cats=curType==='income'?INC:EXP;
  const catObj=cats.find(c=>c.id===cat);
  const btn=document.getElementById('btn-add');
  btn.disabled=true;document.getElementById('add-txt').textContent='Menyimpan...';
  const {data:{user}}=await db.auth.getUser();
  const {data,error}=await db.from('transactions').insert({
    user_id:user.id,type:curType,amount,date,
    category:cat,category_label:catObj?.label||cat,category_icon:catObj?.icon||'💲',note
  }).select().single();
  btn.disabled=false;document.getElementById('add-txt').textContent=curType==='income'?'+ Tambah Pemasukan':'+ Tambah Pengeluaran';
  if(error){alert('Gagal menyimpan: '+error.message);return;}
  txCache.unshift(data);
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('inp-cat').value='';
  renderAll();
}

async function delTx(id){
  if(!confirm('Hapus transaksi ini?'))return;
  const {error}=await db.from('transactions').delete().eq('id',id);
  if(error){alert('Gagal menghapus');return;}
  txCache=txCache.filter(t=>t.id!==id);renderAll();
}

function renderAll(){renderSummary();renderTx();renderChart();populateFilters();}
function fmt(n){return'Rp '+Math.abs(n).toLocaleString('id-ID');}
function fmtDate(d){const mn=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];const[y,m,day]=d.split('-');return`${parseInt(day)} ${mn[parseInt(m)-1]} ${y}`;}

function renderSummary(){
  const inc=txCache.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const exp=txCache.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('s-bal').textContent=fmt(inc-exp);
  document.getElementById('s-inc').textContent=fmt(inc);
  document.getElementById('s-exp').textContent=fmt(exp);
  document.getElementById('s-tot').textContent=txCache.length+' transaksi total';
  document.getElementById('s-incc').textContent=txCache.filter(t=>t.type==='income').length+' transaksi';
  document.getElementById('s-expc').textContent=txCache.filter(t=>t.type==='expense').length+' transaksi';
}

function renderTx(){
  const ft=document.getElementById('f-type').value;
  const fc=document.getElementById('f-cat').value;
  const fm=document.getElementById('f-month').value;
  let txs=txCache;
  if(ft!=='all') txs=txs.filter(t=>t.type===ft);
  if(fc!=='all') txs=txs.filter(t=>t.category===fc);
  if(fm!=='all') txs=txs.filter(t=>t.date.startsWith(fm));
  document.getElementById('tx-ct').textContent=txs.length+' transaksi';
  const el=document.getElementById('tx-list');
  if(!txs.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>Belum ada transaksi</div></div>';return;}
  el.innerHTML=txs.map(t=>`<div class="txi"><div class="txi-icon ${t.type}">${t.category_icon}</div><div class="txi-info"><div class="txi-name">${t.category_label}</div><div class="txi-sub"><span class="badge ${t.type}">${t.type==='income'?'Pemasukan':'Pengeluaran'}</span></div>${t.note?`<div class="txi-note">${t.note}</div>`:''}</div><div class="txi-right"><div class="txi-amt ${t.type}">${t.type==='income'?'+':'-'} ${fmt(t.amount)}</div><div class="txi-date">${fmtDate(t.date)}</div></div><button class="del-btn" onclick="delTx('${t.id}')">✕</button></div>`).join('');
}

function setChart(type){
  curChart=type;
  document.querySelectorAll('.cht').forEach((t,i)=>t.classList.toggle('active',(i===0&&type==='expense')||(i===1&&type==='income')));
  renderChart();
}

function renderChart(){
  const txs=txCache.filter(t=>t.type===curChart);
  const bycat={};
  txs.forEach(t=>{bycat[t.category_label]=(bycat[t.category_label]||0)+Number(t.amount);});
  const labels=Object.keys(bycat),data=Object.values(bycat);
  const total=data.reduce((s,v)=>s+v,0);
  const empty=document.getElementById('chart-empty'),canvas=document.getElementById('donut'),legend=document.getElementById('clegend');
  if(!labels.length){empty.style.display='flex';canvas.style.display='none';legend.innerHTML='';if(donutChart){donutChart.destroy();donutChart=null;}return;}
  empty.style.display='none';canvas.style.display='block';
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(canvas,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:labels.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:3,borderColor:'#161524',hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)} (${((ctx.raw/total)*100).toFixed(1)}%)`},backgroundColor:'#1a1829',titleColor:'#f0eeff',bodyColor:'#9b93b8',borderColor:'rgba(167,139,250,.25)',borderWidth:1,padding:11,cornerRadius:9}}}});
  legend.innerHTML=labels.map((l,i)=>`<div class="cli"><div class="cld" style="background:${COLORS[i%COLORS.length]}"></div><span>${l} <span style="color:var(--text3)">(${((data[i]/total)*100).toFixed(0)}%)</span></span></div>`).join('');
}

function populateFilters(){
  const cats=[...new Set(txCache.map(t=>t.category))];
  const months=[...new Set(txCache.map(t=>t.date.substring(0,7)))].sort().reverse();
  const mn=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const curC=document.getElementById('f-cat').value,curM=document.getElementById('f-month').value;
  const all=[...INC,...EXP];
  document.getElementById('f-cat').innerHTML='<option value="all">Semua Kategori</option>'+cats.map(c=>{const o=all.find(x=>x.id===c);return`<option value="${c}" ${curC===c?'selected':''}>${o?o.icon+' '+o.label:c}</option>`;}).join('');
  document.getElementById('f-month').innerHTML='<option value="all">Semua Bulan</option>'+months.map(m=>{const[y,mo]=m.split('-');return`<option value="${m}" ${curM===m?'selected':''}>${mn[parseInt(mo)-1]} ${y}</option>`;}).join('');
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-screen').style.display!=='none') doAuth();});
init();
</script>
</body>
</html>
